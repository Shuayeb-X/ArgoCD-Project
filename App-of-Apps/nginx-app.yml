apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-child             # Child app name
  namespace: argocd
spec:
  project: default
  source:
    repoURL:  # Repo containing child apps(that you have forked and cloned earlier)
    targetRevision: main
    path:  # path of Apache app in given repo
  destination:
    server: Replace with your Cluster Url, To get run: `argocd cluster list`
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
