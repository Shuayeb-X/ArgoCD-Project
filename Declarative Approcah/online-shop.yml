apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-shop-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Shuayeb-X/ArgoCD-Project.git # Replace it with yourrepo
    targetRevision: main
    path: Online-shop-app #deployent file path
  destination:
    server:  # Replace with your Cluster Url, To get run: `argocd cluster list`
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    
